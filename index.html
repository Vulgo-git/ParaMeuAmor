<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Renata</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #d4af37;
  --pink: #ff2b6a;
  --wine: #4a0e0e;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#111;
  font-family: 'Cinzel', serif;
  overflow:hidden;
  height:100vh;
  color:#fff;
}

canvas {
  position:fixed;
  top:0;
  left:0;
  z-index:1;
  pointer-events:none;
}

.layer {
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  opacity:0;
  transition:opacity 0.8s ease;
  pointer-events:none;
}

.active { opacity:1; pointer-events:auto; }

/* Fotos e frases */
#step1 img {
  width:250px;
  border-radius:15px;
  border:2px solid var(--pink);
  box-shadow:0 0 30px var(--pink);
}
#step1 h1 { margin-top:20px; color:var(--pink); letter-spacing:4px; font-family:'Dancing Script', cursive; font-weight:600; }

/* Envelope */
#envelope-box { transform:translateY(100vh); transition:1s; position:relative; }
#envelope-box img { width:250px; background:transparent; border-radius:10px; }
#envelope-box button {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  border:none;
  border-radius:50%;
  padding:20px 25px;
  background:#900;
  color:#fff;
  font-family:'Cinzel', serif;
  cursor:pointer;
  box-shadow:0 0 20px #900;
}

/* Folhas */
.parchment {
  width:90%;
  max-width:450px;
  aspect-ratio:3/4;
  padding:50px 40px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-family:'Dancing Script', cursive;
  font-size:1.3rem;
  line-height:1.5;
  color:#fff;
}
.clara { background:url('folha_clara.png') no-repeat center/cover; color:#2c1e1a; }
.preta { background:url('folha_preta.png') no-repeat center/cover; color:#fff; }

.text-box { min-height:150px; width:100%; }

.btn-container { display:flex; gap:15px; margin-top:20px; justify-content:center; }
.btn-ui {
  background: var(--wine); color: var(--gold);
  border:1px solid var(--gold);
  padding:12px 20px;
  cursor:pointer;
  border-radius:8px;
  font-family:'Cinzel', serif;
  transition:0.3s;
}
.btn-ui:hover { transform:scale(1.1); background:#631414; }

/* Rosa final giratória */
.rosa-final { font-size:100px; animation:rotateVertical 4s linear infinite; }
@keyframes rotateVertical { from { transform:rotateY(0deg); } to { transform:rotateY(360deg); } }

</style>
</head>
<body>

<audio id="musica" loop><source src="Lana-Del-Rey.mp3" type="audio/mp3"></audio>
<canvas id="mainCanvas"></canvas>

<div id="step1" class="layer">
  <img src="renata.jpg" alt="">
  <h1>EU AMO VOCÊ</h1>
</div>

<div id="step2" class="layer">
  <div id="envelope-box">
    <img src="envelope.png" alt="">
    <button onclick="openLetter(event)">OPEN</button>
  </div>
</div>

<div id="step3" class="layer">
  <div class="parchment clara">
    <div id="typewriter1" class="text-box"></div>
    <div id="btns-texto1" class="btn-container" style="display:none;">
      <button class="btn-ui" onclick="showPassInput(event)">SÓ PARA VOCÊ</button>
      <button class="btn-ui" onclick="goFinal(event)">CONTINUE ❤️</button>
    </div>
  </div>
</div>

<div id="step5" class="layer">
  <div class="parchment preta">
    <div id="typewriter2" class="text-box"></div>
    <button class="btn-ui" style="margin-top:20px" onclick="goFinal(event)">VOLTAR</button>
  </div>
</div>

<div id="step6" class="layer">
  <div class="rosa-final">🌹</div>
  <h1 style="color:var(--pink)">TE AMO</h1>
  <h2 style="color:var(--gold)">FELIZ DIA DAS MULHERES</h2>
</div>

<script>
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
let stage = 0;
let particles = [];

const texto1 = `Meu amor,

Eu fiz isso só para você.

Talvez seja algo simples,
mas foi feito pensando em você em cada detalhe.

Desde que você entrou na minha vida,
tudo ficou mais bonito.

Você é a minha pessoa preferida, eu passo meus dias inteiros pensando em vc e nos seus detalhes que me marcam tanto, até a coisa mais boba na sua visão é algo que eu amo em você.

Com você tudo é mais especial, nossas conversas bobas, até mesmo quando estamos apenas em silêncio em uma simples conversa.

Eu amo os detalhes que compõem o seu ser, eu amo o seu jeito, suas manias, até mesmo amo quando você está brava e brigando comigo, seu jeito é algo único nesse mundo kkkkk você é extremamente apaixonante.

Eu amo sua inteligência e sua visão de mundo.. É lindo ver você falando sobre um simples livro que você lê, uma série, ou até mesmo um episódio de algum programa, eu simplesmente passaria horas, ou melhor dizendo o dia inteiro, só escutando você, ouvindo sua voz que é tão linda que, combinada com esse seu sotaque, é algo que eu amo tanto de todo meu coração.

Eu admiro muito a mulher que você se tornou, todas as coisas que você passou na sua vida até agora, suas lutas e batalhas, sejam mentais ou físicas. Eu admiro como você enfrentou cada dificuldade até hoje e continua correndo atrás de seus sonhos, seja mudando de cidade em cidade ou até mesmo ficando longe de seus pais, isso mostra como você é forte e eu tenho certeza que o seu futuro será brilhante e que realizará seus sonhos.

Não sou ninguém para falar isso, mas eu tenho muito orgulho de você, te conheço há muito tempo e vi as etapas que você foi passando e enfrentando.

Continue sendo essa garota risonha, porque é maravilhoso escutar sua risada, eu realmente amo cada coisinha em você kkkkk, não desista e nunca pare de correr atrás de suas coisas, dificuldades e momentos ruins acontecem, tenho certeza que isso logo acabará e você vai viver feliz.`;

const texto2 = `Agora vou abrir um pouco meu coração..

Minha princesa, eu sei que estamos longe um do outro... (texto secreto completo aqui)`;

function init() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

function drawHeart(sc, color, t) {
  ctx.save();
  ctx.translate(canvas.width/2, canvas.height/2);
  ctx.rotate(t*0.2);
  ctx.beginPath();
  ctx.strokeStyle = color;
  ctx.shadowBlur=20;
  ctx.shadowColor=color;
  for(let i=0;i<=Math.PI*2;i+=0.05){
    const x=16*Math.pow(Math.sin(i),3);
    const y=-(13*Math.cos(i)-5*Math.cos(2*i)-2*Math.cos(3*i)-Math.cos(4*i));
    ctx.lineTo(x*sc,y*sc);
  }
  ctx.stroke();
  ctx.restore();
}

function drawPetals() {
  if(stage >=2 && Math.random()>0.8) particles.push({x:Math.random()*canvas.width, y:-20, s:Math.random()*5+2, sp:Math.random()*2+1});
  particles.forEach((p,i)=>{
    p.y+=p.sp;
    ctx.fillStyle="#f00";
    ctx.beginPath();ctx.ellipse(p.x,p.y,p.s,p.s/1.5,Math.PI/4,0,Math.PI*2);ctx.fill();
    if(p.y>canvas.height) particles.splice(i,1);
  });
}

function animate(){
  ctx.fillStyle="rgba(0,0,0,0.2)";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  const time=Date.now()*0.002;
  if(stage===0) drawHeart(12+Math.sin(time)*2,"#ff69b4",time);
  if(stage>=5) drawHeart(20,"#f00",time);
  drawPetals();
  requestAnimationFrame(animate);
}

// --- Navegação ---
function handleGlobalClick(){
  if(stage===0){
    document.getElementById('musica').play();
    document.getElementById('step1').classList.add('active');
    stage=1;
  }else if(stage===1){
    document.getElementById('step1').classList.remove('active');
    document.getElementById('step2').classList.add('active');
    setTimeout(()=>{document.getElementById('envelope-box').style.transform="translateY(0)";},100);
    stage=2;
  }
}

function openLetter(e){
  e.stopPropagation();
  document.getElementById('step2').classList.remove('active');
  document.getElementById('step3').classList.add('active');
  stage=3;
  typeWrite('typewriter1',texto1,()=>{document.getElementById('btns-texto1').style.display='flex';});
}

function typeWrite(id,txt,cb){
  let i=0;
  const el=document.getElementById(id);
  el.innerHTML="";
  const timer=setInterval(()=>{
    el.innerHTML+=txt.charAt(i);
    i++;
    if(i>=txt.length){clearInterval(timer); if(cb) cb();}
  },40);
}

function showPassInput(e){ e.stopPropagation(); document.getElementById('password-screen').classList.add('active'); }
function goFinal(e){ e.stopPropagation(); document.querySelectorAll('.layer').forEach(l=>l.classList.remove('active')); document.getElementById('step6').classList.add('active'); stage=6; }

window.addEventListener('resize',init);
init(); animate();
document.body.onclick=handleGlobalClick;

</script>
</body>
</html>
