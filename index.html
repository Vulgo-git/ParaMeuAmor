<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Para Renata</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
<style>
:root { --gold:#d4af37; --pink:#ff2b6a; --wine:#4a0e0e; }
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:#111; font-family:'Cinzel', serif; overflow:hidden; height:100vh; color:#fff; display:flex; justify-content:center; align-items:center; }
canvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:1; pointer-events:none; }

.screen { position:absolute; top:0; left:0; width:100%; height:100%; display:flex; justify-content:center; align-items:center; flex-direction:column; opacity:0; pointer-events:none; transition:opacity 0.5s ease; z-index:2; padding:20px; }
.screen.active { opacity:1; pointer-events:auto; }

#screen2 img { width:250px; border-radius:15px; border:2px solid var(--pink); box-shadow:0 0 40px var(--pink); margin-bottom:20px; position:relative; z-index:5; }
#screen2 h1 { color:var(--pink); font-family:'Dancing Script', cursive; font-size:42px; text-shadow:0 0 20px var(--pink); z-index:5; }

#envelope-box { transform:translateY(100vh); transition:transform 1s ease; position:relative; z-index:3; }
#envelope-box svg { width:150px; height:150px; display:block; margin:0 auto; }
#openBtn { position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); background:var(--wine); color:var(--gold); border:2px solid var(--gold); width:80px; height:80px; border-radius:50%; font-size:18px; font-weight:bold; cursor:pointer; box-shadow:0 0 30px #900; z-index:10; font-family:'Cinzel', serif; }

.parchment { width:90%; max-width:450px; background:#f9eac3; padding:40px 25px; border-radius:20px; border:8px solid #b87c4b; border-style:groove; color:#2c1e1a; font-family:'Dancing Script', cursive; font-size:1.2rem; line-height:1.6; max-height:70vh; overflow-y:auto; box-shadow:0 20px 40px rgba(0,0,0,0.8); }
.parchment.dark { background:#2a2a2a; color:#fff; border-color:var(--gold); }
.text-box { min-height:200px; white-space:pre-wrap; }
.btn-small { background:var(--wine); color:var(--gold); border:1px solid var(--gold); padding:10px 20px; border-radius:30px; margin:10px; cursor:pointer; font-family:'Cinzel', serif; font-size:16px; box-shadow:0 0 15px var(--gold); }

.rosa-final { font-size:120px; animation:girar 4s infinite linear; filter:drop-shadow(0 0 40px #ff3366); margin-bottom:30px; }
@keyframes girar { from { transform:rotateY(0deg);} to { transform:rotateY(360deg);} }
#screen6 h1 { color:var(--pink); font-size:48px; font-family:'Dancing Script', cursive; text-shadow:0 0 30px var(--pink); }
#screen6 h2 { color:var(--gold); font-size:32px; margin-top:20px; }

#senha-screen { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:100; display:flex; justify-content:center; align-items:center; flex-direction:column; opacity:0; pointer-events:none; transition:0.3s; }
#senha-screen.active { opacity:1; pointer-events:auto; }
#senha-screen input { padding:15px; font-size:20px; margin:20px; border-radius:10px; border:2px solid var(--gold); background:#222; color:white; text-align:center; width:200px; }

.btn-circle { position:fixed; bottom:30px; right:30px; width:60px; height:60px; border-radius:50%; background:var(--pink); color:white; border:3px solid var(--gold); font-size:30px; display:flex; justify-content:center; align-items:center; cursor:pointer; box-shadow:0 0 30px var(--pink); z-index:20; transition:0.3s; }
.btn-circle:active { transform:scale(0.9);}
.btn-circle.hidden { display:none;}

svg path#line { fill: none; stroke: #e00000; stroke-width: 2; stroke-linecap:butt; stroke-linejoin:round; stroke-miterlimit:4; stroke-dasharray:1; stroke-dashoffset:1; animation: dash 4s linear infinite; }
svg path#heart { transform-origin: 50% 50%; animation: blink 4s linear infinite; }

@keyframes dash { 0% { stroke-dashoffset: 1; } 80% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: 0; } }
@keyframes blink { 0% { opacity:0; transform:scale(0);} 60% {opacity:0; transform:scale(0);} 70% {opacity:1; transform:scale(1.2);} 75% {opacity:1; transform:scale(1.0);} 80% {opacity:1; transform:scale(1.2);} 85% {opacity:1; transform:scale(1.0);} 100% {opacity:0; transform:scale(1.0);} }
</style>
</head>
<body>

<audio id="musica" loop src="Lana-Del-Rey.mp3"></audio>
<canvas id="canvas"></canvas>

<!-- Tela 1: coração pulsando inicial -->
<div id="screen1" class="screen active">
  <svg xmlns="http://www.w3.org/2000/svg" id="svg5" version="1.1" viewBox="0 0 502.98 108.61"> 
    <path id="heart" d="M213.35 29.43c19.41-15.19 33.68 10.86 37.73 18.82-.28-13.61 11.64-40.98 25.94-34.01 32.3 15.74-15.88 83.8-26.4 81.76-13.24-9-51.35-53.3-37.27-66.57Z" style="fill:#ff9999;stroke:#ff9999;stroke-width:1.5;"/>
    <path id="line" d="M5.32 78.13c..."/>
  </svg>
  <button class="btn-circle" id="startBtn">→</button>
</div>

<!-- Tela 2: foto e coração rosa -->
<div id="screen2" class="screen">
  <div class="coração-foto">
    <img src="renata.jpg" alt="Renata">
    <h1>EU AMO VOCÊ</h1>
  </div>
  <button class="btn-circle" id="nextScreen2Btn">→</button>
</div>

<!-- Tela 3: envelope -->
<div id="screen3" class="screen">
  <div id="envelope-box">
    <svg viewBox="0 0 100 100">
      <rect x="10" y="20" width="80" height="60" fill="#ff2b6a" stroke="#d4af37" stroke-width="3"/>
      <polygon points="10,20 50,50 90,20" fill="#ff3366"/>
    </svg>
    <button id="openBtn">OPEN</button>
  </div>
</div>

<!-- Tela 4: carta -->
<div id="screen4" class="screen">
  <div class="parchment">
    <div id="texto-carta" class="text-box"></div>
    <div style="display:flex; justify-content:center; gap:15px; margin-top:20px;">
      <button class="btn-small" id="secretoBtn">🔒 Só para Você</button>
      <button class="btn-small" id="continuarBtn">Continuar</button>
    </div>
  </div>
</div>

<!-- Tela 5: carta secreta -->
<div id="screen5" class="screen">
  <div class="parchment dark">
    <div id="texto-secreto" class="text-box"></div>
    <button class="btn-small" id="voltarBtn" style="margin-top:20px;">Voltar</button>
  </div>
</div>

<!-- Tela 6: rosa final -->
<div id="screen6" class="screen">
  <div class="rosa-final">🌹</div>
  <h1>TE AMO</h1>
  <h2>FELIZ DIA DAS MULHERES</h2>
</div>

<!-- Tela senha -->
<div id="senha-screen">
  <h2 style="color:var(--gold); margin-bottom:20px;">SÓ PARA VOCÊ</h2>
  <input type="password" id="senhaInput" placeholder="Digite a senha">
  <button class="btn-small" id="confirmarSenha">ENTRAR</button>
  <button class="btn-small" id="cancelarSenha" style="background:#333;">Cancelar</button>
</div>

<script>
const TEXTO_PRINCIPAL = `Meu amor,

Eu fiz isso só para você.

Talvez seja algo simples,
mas foi feito pensando em você em cada detalhe.

Desde que você entrou na minha vida,
tudo ficou mais bonito.

Você é a minha pessoa preferida, eu passo meus dias inteiros pensando em vc e nos seus detalhes que me marcam tanto, até a coisa mais boba na sua visão é algo que eu amo em você.

Com você tudo é mais especial, nossas conversas bobas, até mesmo quando estamos apenas em silêncio em uma simples conversa.

Eu amo os detalhes que compõem o seu ser, eu amo o seu jeito, suas manias, até mesmo amo quando você está brava e brigando comigo, seu jeito é algo único nesse mundo kkkkk você é extremamente apaixonante.

Eu amo sua inteligência e sua visão de mundo.. É lindo ver você falando sobre um simples livro que você lê, uma série, ou até mesmo um episódio de algum programa, eu simplesmente passaria horas, ou melhor dizendo o dia inteiro, só escutando você, ouvindo sua voz que é tão linda que, combinada com esse seu sotaque, é algo que eu amo tanto de todo meu coração.

Eu admiro muito a mulher que você se tornou, todas as coisas que você passou na sua vida até agora, suas lutas e batalhas, sejam mentais ou físicas. Eu admiro como você enfrentou cada dificuldade até hoje e continua correndo atrás de seus sonhos, seja mudando de cidade em cidade ou até mesmo ficando longe de seus pais, isso mostra como você é forte e eu tenho certeza que o seu futuro será brilhante e que realizará seus sonhos.

Não sou ninguém para falar isso, mas eu tenho muito orgulho de você, te conheço há muito tempo e vi as etapas que você foi passando e enfrentando.

Continue sendo essa garota risonha, porque é maravilhoso escutar sua risada, eu realmente amo cada coisinha em você kkkkk, não desista e nunca pare de correr atrás de suas coisas, dificuldades e momentos ruins acontecem, tenho certeza que isso logo acabará e você vai viver feliz.`;

const TEXTO_SECRETO = `Agora vou abrir um pouco meu coração..

Minha princesa, eu sei que estamos longe um do outro, literalmente uma das coisas que mais me machucam todos os dias, eu ultimamente sou uma pessoa triste por estar longe de você, eu sei que você me entende, e dói muito não poder sentir você ou algo simples que é olhar em seus olhos, o que eu vou falar agora pode ser egoísta, mas o que eu mais anseio é poder estar e viver com você nesse momento, a dor de não poder ser seu apoio em suas dificuldades, não conseguir te dar no mínimo um colo em seus momentos tristes me machuca todos os dias, me deixa triste ver você passando por essas situações merdas e não poder te dar um simples abraço, amor eu te amo tanto, em breve se Deus quiser vamos estar juntos e planejando nosso futuro, eu quero viver com você sempre, eu preciso de você, eu quero cuidar de você, quero ser o seu porto seguro em seus momentos frágeis, quero ser a pessoa que vai beijar e ajudar a cicatrizar e curar tudo o que te machuca, eu quero te fazer a mulher mais feliz desse mundo.

Eu te amo muito minha garota inefável, eu te amo de todo o meu coração 🌹❤️;

Você é a mulher mais linda desse mundo, eu amo seu cabelo, eu amo sua boca, eu amo seu narizinho maravilhoso, amo seus olhos, amo demais esse pescoço lindo kkkkk, sua cinturinha maravilhosa e esse copitcho que me deixa com vontade de morder, você é muito gostosa, perfeita, eu quero você toda, você é meu tesão, eu te quero muito.

Enfim, feliz Dia das Mulheres meu amor, eu te amo muito muito muito.`;

const SENHA = "0312";

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let stage=1, petalas=[], musica=document.getElementById('musica');

function resizeCanvas(){canvas.width=window.innerWidth; canvas.height=window.innerHeight;}
window.addEventListener('resize',resizeCanvas); resizeCanvas();

for(let i=0;i<30;i++){petalas.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,tamanho:10+Math.random()*15,velocidade:1+Math.random()*2,rotacao:Math.random()*Math.PI*2,cor:`rgba(255,80,120,${0.3+Math.random()*0.3})`})}

function desenharPetalas(){
  petalas.forEach(p=>{
    p.y+=p.velocidade*0.5; 
    p.rotacao+=0.01; 
    if(p.y>canvas.height+50){p.y=-50;p.x=Math.random()*canvas.width} 
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rotacao); ctx.fillStyle=p.cor; 
    ctx.shadowBlur=10; ctx.shadowColor='#ff69b4'; 
    ctx.beginPath(); ctx.ellipse(0,0,p.tamanho/2,p.tamanho/4,0,0,Math.PI*2); ctx.fill(); ctx.restore();
  })
}

function desenharCoracao(tempo,escala=20,cx=canvas.width/2,cy=canvas.height/2){
  ctx.save(); ctx.translate(cx,cy); ctx.rotate(Math.sin(tempo*0.5)*0.05);
  ctx.beginPath(); ctx.strokeStyle='#ff69b4'; ctx.lineWidth=4; ctx.shadowBlur=30; ctx.shadowColor='#ff1493';
  for(let t=0;t<=Math.PI*2;t+=0.05){const x=16*Math.pow(Math.sin(t),3); const y=-(15*Math.cos(t)-6*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)); t===0?ctx.moveTo(x*escala,y*escala):ctx.lineTo(x*escala,y*escala);}
  ctx.stroke(); ctx.restore();
}

function animar(){ctx.clearRect(0,0,canvas.width,canvas.height); const tempo=Date.now()*0.002;
  if(stage>=2)desenharPetalas();
  if(stage===1)desenharCoracao(tempo,20);
  if(stage===2)desenharCoracao(tempo,22);
  requestAnimationFrame(animar);
}
animar();

function mostrarTela(n){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); 
  document.getElementById(`screen${n}`).classList.add('active'); 
  stage=n;
  document.getElementById('startBtn')?.classList.toggle('hidden',n!==1);
  document.getElementById('nextBtn')?.classList.toggle('hidden',n>=4);
  if(n===3){setTimeout(()=>{document.getElementById('envelope-box').style.transform='translateY(0)';},100)}
}

document.getElementById('startBtn').addEventListener('click',()=>{
  musica.play().catch(()=>{});
  mostrarTela(2);
});

document.getElementById('nextScreen2Btn').addEventListener('click',()=>{
  mostrarTela(3);
});

document.getElementById('openBtn').addEventListener('click',()=>{mostrarTela(4); digitarTexto(document.getElementById('texto-carta'),TEXTO_PRINCIPAL);});

function digitarTexto(el,texto,vel=30){el.innerHTML=''; let i=0; function dig(){if(i<texto.length){el.innerHTML+=texto[i]; i++; setTimeout(dig,vel);}} dig();}

document.getElementById('secretoBtn').addEventListener('click',()=>{document.getElementById('senha-screen').classList.add('active');});
document.getElementById('confirmarSenha').addEventListener('click',()=>{
  const input=document.getElementById('senhaInput'); 
  if(input.value===SENHA){document.getElementById('senha-screen').classList.remove('active'); mostrarTela(5); digitarTexto(document.getElementById('texto-secreto'),TEXTO_SECRETO);} 
  else{alert('Senha errada!');}
});
document.getElementById('cancelarSenha').addEventListener('click',()=>{document.getElementById('senha-screen').classList.remove('active');});
document.getElementById('voltarBtn').addEventListener('click',()=>{mostrarTela(4);});
document.getElementById('continuarBtn').addEventListener('click',()=>{mostrarTela(6);});

mostrarTela(1);
</script>
</body>
</html>
