<!DOCTYPE html>
<html lang="pt-br>
<head>
<meta charset="UTF-8">
<title>Para Renata</title>

<style>

body{
margin:0;
background:#050505;
overflow:hidden;
font-family:Georgia,serif;
}

canvas{
position:absolute;
top:0;
left:0;
}

.carta-overlay{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.8);
opacity:0;
pointer-events:none;
transition:1s;
}

.carta-overlay.show{
opacity:1;
pointer-events:auto;
}

.carta{

background:#f3e0b5;
width:700px;
max-width:90%;
padding:50px;
border:12px solid #b87c4b;
box-shadow:0 0 60px black;
position:relative;
}

.carta:before{

content:"";
position:absolute;
inset:10px;
border:3px dashed #b87c4b;

}

.selo{

position:absolute;
top:-40px;
right:-40px;
width:90px;
height:90px;
background:#8b0000;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 20px black;
}

#textoCarta{

font-family:cursive;
font-size:28px;
line-height:1.7;
color:#402616;
white-space:pre-wrap;

}

</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="carta-overlay" id="cartaOverlay">

<div class="carta">

<div class="selo" id="selo">OPEN</div>

<div id="textoCarta"></div>

</div>

</div>

<script>

const config={

foto:"minha-musa.jpg.jpg",

musica:"Lana-Del-Rey.mp3.mp3",

texto:`Renata,

Desde que você entrou na minha vida,
tudo ficou diferente.

Seu olhar me acalma,
seu sorriso ilumina meus dias,
e sua presença faz tudo fazer sentido.

Hoje eu só queria te lembrar
o quanto você é especial para mim.

Eu te amo.

Com amor.`

}

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

canvas.width=innerWidth
canvas.height=innerHeight

window.onresize=()=>{

canvas.width=innerWidth
canvas.height=innerHeight

}

const musica=new Audio(config.musica)
musica.loop=true
musica.volume=0.5

let estagio=0
let particulas=[]
let petalas=[]

const img=new Image()
img.src=config.foto

let particulasFoto=[]

img.onload=()=>{

const t=document.createElement("canvas")
const tc=t.getContext("2d")

t.width=300
t.height=img.height*(300/img.width)

tc.drawImage(img,0,0,t.width,t.height)

const data=tc.getImageData(0,0,t.width,t.height).data

for(let y=0;y<t.height;y+=3){

for(let x=0;x<t.width;x+=3){

let i=(y*t.width+x)*4

let bright=(data[i]+data[i+1]+data[i+2])/3

if(bright<220){

particulasFoto.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,

tx:(x-t.width/2)*2+canvas.width/2,
ty:(y-t.height/2)*2+canvas.height/2-80,

s:2+Math.random()*3

})

}

}

}

}

function criarCoracao(){

particulas=[]

for(let i=0;i<1600;i++){

let t=Math.random()*Math.PI*2

let x=16*Math.pow(Math.sin(t),3)
let y=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)

particulas.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,

tx:x*20+canvas.width/2,
ty:-y*20+canvas.height/2,

s:2+Math.random()*3

})

}

}

function criarTexto(){

const t=document.createElement("canvas")
const c=t.getContext("2d")

t.width=600
t.height=120

c.fillStyle="white"
c.font="bold 70px Arial"
c.textAlign="center"

c.fillText("EU AMO VOCÊ",300,80)

let data=c.getImageData(0,0,t.width,t.height).data

particulas=[]

for(let y=0;y<t.height;y+=3){

for(let x=0;x<t.width;x+=3){

let i=(y*t.width+x)*4

if(data[i]>200){

particulas.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,

tx:(x-t.width/2)+canvas.width/2,
ty:(y-t.height/2)+canvas.height/2+160,

s:3

})

}

}

}

}

function criarPetalas(){

for(let i=0;i<200;i++){

petalas.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,

vy:1+Math.random()*2,
vx:(Math.random()-0.5)*0.5,

r:Math.random()*Math.PI,

s:10+Math.random()*15

})

}

}

function animar(){

ctx.fillStyle="rgba(0,0,0,0.15)"
ctx.fillRect(0,0,canvas.width,canvas.height)

particulas.forEach(p=>{

p.x+=(p.tx-p.x)*0.05
p.y+=(p.ty-p.y)*0.05

ctx.beginPath()

let g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.s*4)

g.addColorStop(0,"rgba(255,105,180,1)")
g.addColorStop(1,"rgba(255,105,180,0)")

ctx.fillStyle=g

ctx.arc(p.x,p.y,p.s,0,Math.PI*2)

ctx.fill()

})

petalas.forEach(p=>{

p.y+=p.vy
p.x+=p.vx

if(p.y>canvas.height)p.y=-20

ctx.save()

ctx.translate(p.x,p.y)
ctx.rotate(p.r)

ctx.beginPath()

ctx.moveTo(0,0)
ctx.quadraticCurveTo(p.s/2,-p.s/3,p.s,0)
ctx.quadraticCurveTo(p.s/2,p.s/3,0,0)

ctx.fillStyle="rgba(220,20,60,0.8)"

ctx.fill()

ctx.restore()

})

requestAnimationFrame(animar)

}

document.addEventListener("click",e=>{

const carta=document.getElementById("cartaOverlay")

if(e.target.id==="selo"){

let t=config.texto
let el=document.getElementById("textoCarta")

let i=0

function dig(){

if(i<t.length){

el.innerHTML+=t[i]

i++

setTimeout(dig,40)

}

}

dig()

return

}

estagio++

if(estagio===1){

musica.play()

criarCoracao()

}

if(estagio===2){

particulas=particulasFoto

}

if(estagio===3){

criarTexto()

}

if(estagio===4){

particulas=[]
criarPetalas()

}

if(estagio===5){

carta.classList.add("show")

}

})

criarCoracao()

animar()

</script>

</body>
</html>
