<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Renata ❤️</title>

<style>

body{
margin:0;
background:radial-gradient(circle at center,#1a0008,#000);
overflow:hidden;
font-family:serif;
color:white;
text-align:center;
}

canvas{
position:absolute;
top:0;
left:0;
}

#foto{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
width:70%;
max-width:350px;
border-radius:15px;
box-shadow:0 0 40px rgba(255,0,80,0.6);
display:none;
}

#frase{
position:absolute;
top:70%;
width:100%;
font-size:28px;
letter-spacing:4px;
color:#ff4b6e;
text-shadow:0 0 15px #ff4b6e;
display:none;
font-weight:300;
}

#envelope{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:260px;
height:180px;
background:#f5e6d3;
border:3px solid #b3002d;
display:none;
}

#open{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
background:#b3002d;
color:white;
padding:8px 20px;
border-radius:20px;
cursor:pointer;
}

#carta{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:85%;
height:70%;
background:#f8f1e6;
color:#3a2c2c;
padding:25px;
font-size:18px;
line-height:1.6;
font-style:italic;
display:none;
box-shadow:0 0 30px rgba(0,0,0,0.6);
}

#continuar{
margin-top:20px;
padding:10px 20px;
background:#b3002d;
color:white;
border:none;
border-radius:20px;
display:none;
}

#rosa{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:120px;
display:none;
animation:spin 10s linear infinite;
}

#final{
position:absolute;
bottom:20%;
width:100%;
font-size:28px;
display:none;
text-shadow:0 0 15px pink;
}

@keyframes spin{
0%{transform:translate(-50%,-50%) rotate(0)}
100%{transform:translate(-50%,-50%) rotate(360deg)}
}

</style>
</head>

<body>

<canvas id="c"></canvas>

<img src="renata.jpg" id="foto">

<div id="frase">EU AMO VOCÊ</div>

<div id="envelope">
<div id="open">OPEN</div>
</div>

<div id="carta">
<div id="texto"></div>
<button id="continuar">continuar</button>
</div>

<div id="rosa">🌹</div>

<div id="final">
Eu te amo.<br>
Feliz Dia das Mulheres
</div>

<audio id="musica" src="Lana-Del-Rey.mp3"></audio>

<script>

const canvas=document.getElementById("c")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

class Particle{
constructor(x,y){
this.x=x
this.y=y
this.vx=(Math.random()-0.5)*2
this.vy=(Math.random()-0.5)*2
this.size=2
}

move(){
this.x+=this.vx
this.y+=this.vy

if(this.x<0||this.x>canvas.width) this.vx*=-1
if(this.y<0||this.y>canvas.height) this.vy*=-1
}

draw(){
ctx.fillStyle="rgba(255,40,90,0.8)"
ctx.beginPath()
ctx.arc(this.x,this.y,this.size,0,Math.PI*2)
ctx.fill()
}
}

for(let i=0;i<300;i++){
particles.push(new Particle(
Math.random()*canvas.width,
Math.random()*canvas.height
))
}

function animate(){

ctx.fillStyle="rgba(0,0,0,0.2)"
ctx.fillRect(0,0,canvas.width,canvas.height)

particles.forEach(p=>{
p.move()
p.draw()
})

requestAnimationFrame(animate)
}

animate()

let etapa=0

document.body.onclick=()=>{

if(etapa===0){

document.getElementById("musica").play()

document.getElementById("foto").style.display="block"
document.getElementById("frase").style.display="block"

etapa=1
}

else if(etapa===1){

document.getElementById("foto").style.display="none"
document.getElementById("frase").style.display="none"

startPetals()

document.getElementById("envelope").style.display="block"

etapa=2
}

}

function startPetals(){

setInterval(()=>{

let petal=document.createElement("div")
petal.innerHTML="🌸"

petal.style.position="absolute"
petal.style.left=Math.random()*window.innerWidth+"px"
petal.style.top="-20px"
petal.style.fontSize="20px"

document.body.appendChild(petal)

let fall=setInterval(()=>{

petal.style.top=(petal.offsetTop+2)+"px"

if(petal.offsetTop>window.innerHeight){
clearInterval(fall)
petal.remove()
}

},20)

},200)

}

document.getElementById("open").onclick=()=>{

document.getElementById("envelope").style.display="none"
document.getElementById("carta").style.display="block"

writeText()

}

let texto=`Minha querida Renata,

Desde que você entrou na minha vida,
tudo passou a ter mais cor.

Seu sorriso ilumina meus dias
e sua presença transforma tudo
em algo mais bonito.

Hoje eu só quero te lembrar
o quanto você é especial.

...`

let i=0

function writeText(){

let t=setInterval(()=>{

document.getElementById("texto").innerHTML+=texto.charAt(i)

i++

if(i>=texto.length){
clearInterval(t)
document.getElementById("continuar").style.display="inline-block"
}

},40)

}

document.getElementById("continuar").onclick=()=>{

document.getElementById("carta").style.display="none"

document.getElementById("rosa").style.display="block"
document.getElementById("final").style.display="block"

}

</script>

</body>
</html>
