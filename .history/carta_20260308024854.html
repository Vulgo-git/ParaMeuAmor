<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>💗 Para Você 💗</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            overflow: hidden;
            font-family: 'Georgia', serif;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        #instrucao {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 24px;
            text-shadow: 0 0 20px #ff69b4;
            background: rgba(0,0,0,0.6);
            padding: 15px 40px;
            border-radius: 60px;
            border: 2px solid #ff69b4;
            z-index: 20;
            animation: pulse 1.5s infinite;
            letter-spacing: 2px;
            backdrop-filter: blur(5px);
            cursor: pointer;
            transition: 0.3s;
        }

        #instrucao:hover {
            background: rgba(255,105,180,0.3);
            transform: translateX(-50%) scale(1.05);
        }

        @keyframes pulse {
            0% { opacity: 0.8; box-shadow: 0 0 20px #ff69b4; }
            50% { opacity: 1; box-shadow: 0 0 50px #ff1493; }
            100% { opacity: 0.8; box-shadow: 0 0 20px #ff69b4; }
        }

        /* CARTA ANTIGA */
        .carta-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 30;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1.2s ease;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
        }

        .carta-overlay.visivel {
            opacity: 1;
            pointer-events: auto;
        }

        .carta-antiga {
            width: 750px;
            max-width: 90%;
            background: #f9eac3;
            padding: 50px;
            border-radius: 30px 30px 30px 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.9), 
                        0 0 0 4px #b87c4b, 
                        0 0 0 10px #d9b382;
            position: relative;
            border: 15px solid #b87c4b;
            border-style: groove;
            transform: rotate(0.8deg);
            animation: surgirCarta 1.5s ease;
        }

        @keyframes surgirCarta {
            0% { transform: rotate(0deg) scale(0.5); opacity: 0; }
            100% { transform: rotate(0.8deg) scale(1); opacity: 1; }
        }

        /* Efeito de borda queimada */
        .carta-antiga::before {
            content: "";
            position: absolute;
            top: -20px;
            left: -20px;
            right: -20px;
            bottom: -20px;
            border-radius: 45px;
            background: radial-gradient(circle at 0% 0%, rgba(139,69,19,0.6) 0%, transparent 40%),
                        radial-gradient(circle at 100% 100%, rgba(139,69,19,0.6) 0%, transparent 40%),
                        radial-gradient(circle at 0% 100%, rgba(210,105,30,0.5) 0%, transparent 40%),
                        radial-gradient(circle at 100% 0%, rgba(210,105,30,0.5) 0%, transparent 40%);
            pointer-events: none;
            z-index: -1;
        }

        .selo {
            position: absolute;
            top: -25px;
            right: -25px;
            width: 100px;
            height: 100px;
            background: #c9a355;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #4d2e1b;
            font-weight: bold;
            font-size: 20px;
            box-shadow: 0 8px 20px black, 0 0 0 5px #f9eac3, 0 0 0 10px #b87c4b;
            transform: rotate(12deg);
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Arial', sans-serif;
            letter-spacing: 2px;
            animation: brilhaSelo 2s infinite alternate;
        }

        @keyframes brilhaSelo {
            from { box-shadow: 0 8px 20px black, 0 0 0 5px #f9eac3, 0 0 0 10px #b87c4b, 0 0 20px gold; }
            to { box-shadow: 0 8px 30px black, 0 0 0 5px #f9eac3, 0 0 0 10px #daa520, 0 0 60px #ffd700; }
        }

        .selo:hover {
            transform: rotate(12deg) scale(1.1);
        }

        .selo span {
            font-size: 32px;
        }

        .conteudo-carta {
            max-height: 60vh;
            overflow-y: auto;
            padding: 10px 20px 10px 10px;
            scrollbar-width: thin;
            scrollbar-color: #b87c4b #f9eac3;
        }

        .conteudo-carta::-webkit-scrollbar {
            width: 10px;
        }

        .conteudo-carta::-webkit-scrollbar-track {
            background: #f9eac3;
        }

        .conteudo-carta::-webkit-scrollbar-thumb {
            background: #b87c4b;
            border-radius: 10px;
        }

        #textoCarta {
            font-family: 'Dancing Script', 'Brush Script MT', cursive;
            font-size: 28px;
            line-height: 1.7;
            color: #4a2c1a;
            text-shadow: 1px 1px 0 #fff6d5;
            white-space: pre-wrap;
            min-height: 300px;
        }

        .area-secreta {
            margin-top: 40px;
            padding-top: 25px;
            border-top: 3px double #b87c4b;
            text-align: center;
        }

        #textoSecreto {
            background: rgba(184, 124, 75, 0.2);
            padding: 25px;
            border-radius: 20px;
            margin-top: 10px;
            font-size: 24px;
            color: #3a2416;
            border: 2px dashed #b87c4b;
            display: none;
            font-family: 'Dancing Script', cursive;
            cursor: pointer;
        }

        #textoSecreto.visivel {
            display: block;
            animation: fadeIn 1s;
        }

        .area-secreta > div:first-child {
            background: #8b5a2b;
            color: #f9eac3;
            border: 3px solid #d4a373;
            padding: 12px 35px;
            font-size: 22px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 2px;
            transition: 0.3s;
            box-shadow: 0 5px 15px black;
            display: inline-block;
            margin-bottom: 20px;
        }

        .area-secreta > div:first-child:hover {
            background: #a8753a;
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ROSA FINAL */
        .final-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            background: radial-gradient(ellipse at center, #0d0d2b, #000);
            opacity: 0;
            pointer-events: none;
            transition: opacity 2s ease;
        }

        .final-container.visivel {
            opacity: 1;
            pointer-events: auto;
        }

        .rosa-final {
            width: 300px;
            height: 300px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><radialGradient id="rg"><stop offset="0%" stop-color="%23ff4d4d"/><stop offset="80%" stop-color="%23b30000"/></radialGradient></defs><path d="M50,20 Q30,8 16,28 Q6,45 24,62 Q35,72 50,82 Q65,72 76,62 Q94,45 84,28 Q70,8 50,20Z" fill="url(%23rg)"/><path d="M44,34 Q50,28 56,34 Q60,42 50,50 Q40,42 44,34Z" fill="%23ffcccc"/><circle cx="42" cy="38" r="3.5" fill="%23fff2b0"/><circle cx="58" cy="38" r="3.5" fill="%23fff2b0"/><path d="M44 60 Q50 72 56 60" stroke="%23ff4d4d" stroke-width="3" fill="none"/></svg>');
            background-size: contain;
            animation: girar 18s infinite linear;
            filter: drop-shadow(0 0 60px #ff4d4d);
        }

        @keyframes girar {
            0% { transform: rotateY(0deg) scale(1); }
            50% { transform: rotateY(180deg) scale(1.1); }
            100% { transform: rotateY(360deg) scale(1); }
        }

        #fraseFinal {
            margin-top: 50px;
            color: white;
            font-size: 48px;
            font-family: 'Dancing Script', cursive;
            text-shadow: 0 0 30px #ff69b4, 0 0 60px #ff1493;
            text-align: center;
            opacity: 0;
            animation: aparecerFrase 2s 2.5s forwards;
        }

        #fraseFinal small {
            display: block;
            font-size: 40px;
            margin-top: 25px;
            color: #ffb6c1;
        }

        @keyframes aparecerFrase {
            to { opacity: 1; }
            from { opacity: 0; }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div id="instrucao">💗 Clique para começar 💗</div>
    
    <!-- CARTA ANTIGA -->
    <div class="carta-overlay" id="cartaOverlay">
        <div class="carta-antiga">
            <div class="selo" id="seloOpen">
                <span>💌</span>
                OPEN
            </div>
            <div class="conteudo-carta">
                <div id="textoCarta"></div>
                
                <div class="area-secreta">
                    <div id="btnSecreto">🔒 Só pra ela</div>
                    <div id="textoSecreto"></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- ROSA FINAL -->
    <div class="final-container" id="finalContainer">
        <div class="rosa-final"></div>
        <div id="fraseFinal">
            <span id="euTeAmo"></span><br>
            <small id="felizDia"></small>
        </div>
    </div>

    <script>
        // ===========================================
        // CONFIGURAÇÕES
        // ===========================================
        const config = {
            foto: 'minha-musa.jpg.jpg',
            musica: 'Lana-Del-Rey.mp3.mp3',
            
            textoCarta: `Meu amor,

Escrevo esta carta para registrar o que meu coração grita todos os dias: você é a pessoa mais incrível que já conheci.

Seu olhar me encanta, seu sorriso me desarma, sua presença me completa.

Hoje, no Dia das Mulheres, quero celebrar a mulher maravilhosa que você é. O mundo é mais bonito porque você está nele.

Te amo hoje, amanhã e sempre.

Com amor,
[Seu nome] ❤️`,
            
            textoSecreto: `Agora é só nós dois...

Você é a dona do meu coração, a razão do meu sorriso, a paz da minha alma.

Esse segredo é nosso: eu te amo mais do que consigo expressar.

Guardei esse espaço só pra você, porque você merece tudo de mais especial.

Pra sempre seu,
[Seu nome] 💕`,
            
            seuNome: 'Seu nome aqui',
        };

        // ===========================================
        // INICIALIZAÇÃO
        // ===========================================
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const container = document.body;
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Áudio
        const musica = new Audio();
        musica.loop = true;
        musica.volume = 0.4;
        
        // Variáveis
        let estagio = 0;
        let particulas = [];
        let particulasOlhar = [];
        let petalas = [];
        let musicaIniciada = false;
        let animationId;
        
        // ===========================================
        // CARREGAR FOTO
        // ===========================================
        const img = new Image();
        img.src = config.foto;
        img.crossOrigin = 'anonymous';
        
        img.onload = function() {
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            
            const maxWidth = 300;
            const scale = maxWidth / img.width;
            tempCanvas.width = maxWidth;
            tempCanvas.height = img.height * scale;
            
            tempCtx.drawImage(img, 0, 0, tempCanvas.width, tempCanvas.height);
            
            const imageData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
            const data = imageData.data;
            
            for (let y = 0; y < tempCanvas.height; y += 2) {
                for (let x = 0; x < tempCanvas.width; x += 2) {
                    const index = (y * tempCanvas.width + x) * 4;
                    const brightness = (data[index] + data[index+1] + data[index+2]) / 3;
                    
                    if (brightness > 30 && brightness < 230) {
                        particulasOlhar.push({
                            targetX: (x - tempCanvas.width/2) * 2 + canvas.width/2,
                            targetY: (y - tempCanvas.height/2) * 2 + canvas.height/2 - 50,
                            currentX: Math.random() * canvas.width,
                            currentY: Math.random() * canvas.height,
                            cor: `rgba(255, 105, 180, ${0.5 + Math.random()*0.5})`,
                            tamanho: 2 + Math.random() * 4,
                            velocidade: 0.02 + Math.random() * 0.02
                        });
                    }
                }
            }
        };

        // ===========================================
        // CORAÇÃO
        // ===========================================
        function criarCoracao() {
            const pts = [];
            for (let i = 0; i < 1800; i++) {
                const t = Math.random() * Math.PI * 2;
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                
                pts.push({
                    targetX: (x * 22) + canvas.width/2,
                    targetY: (y * -22) + canvas.height/2,
                    currentX: Math.random() * canvas.width,
                    currentY: Math.random() * canvas.height,
                    cor: `rgba(255, 105, 180, ${0.7 + Math.random()*0.3})`,
                    tamanho: 2.5 + Math.random() * 4,
                    velocidade: 0.025 + Math.random() * 0.02
                });
            }
            return pts;
        }

        // ===========================================
        // FRASE "EU AMO VOCÊ"
        // ===========================================
        function criarFraseLuz() {
            const pts = [];
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            
            tempCanvas.width = 700;
            tempCanvas.height = 150;
            
            tempCtx.font = 'bold 80px Arial';
            tempCtx.fillStyle = 'white';
            tempCtx.textAlign = 'center';
            tempCtx.fillText('EU AMO VOCÊ', tempCanvas.width/2, tempCanvas.height/2);
            
            const imageData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
            const data = imageData.data;
            
            for (let y = 0; y < tempCanvas.height; y += 3) {
                for (let x = 0; x < tempCanvas.width; x += 3) {
                    const index = (y * tempCanvas.width + x) * 4;
                    if (data[index] > 128) {
                        pts.push({
                            targetX: (x - tempCanvas.width/2) + canvas.width/2,
                            targetY: (y - tempCanvas.height/2) + canvas.height/2 - 30,
                            currentX: Math.random() * canvas.width,
                            currentY: Math.random() * canvas.height,
                            cor: `rgba(255, 105, 180, 0.9)`,
                            tamanho: 3.5,
                            velocidade: 0.03
                        });
                    }
                }
            }
            return pts;
        }

        // ===========================================
        // PÉTALAS BONITAS
        // ===========================================
        function criarPetalas() {
            for (let i = 0; i < 250; i++) {
                petalas.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    tamanho: 15 + Math.random() * 25,
                    velY: 1 + Math.random() * 3,
                    velX: (Math.random() - 0.5) * 0.8,
                    rot: Math.random() * Math.PI * 2,
                    cor: `rgba(220, 20, 60, ${0.5 + Math.random()*0.4})`,
                });
            }
        }

        // ===========================================
        // ANIMAÇÃO
        // ===========================================
        function animar() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Partículas
            if (particulas.length > 0) {
                particulas.forEach(p => {
                    p.currentX += (p.targetX - p.currentX) * p.velocidade;
                    p.currentY += (p.targetY - p.currentY) * p.velocidade;
                    
                    ctx.beginPath();
                    ctx.arc(p.currentX, p.currentY, p.tamanho, 0, 2 * Math.PI);
                    
                    const grad = ctx.createRadialGradient(
                        p.currentX, p.currentY, 0,
                        p.currentX, p.currentY, p.tamanho * 3
                    );
                    grad.addColorStop(0, p.cor);
                    grad.addColorStop(1, 'rgba(255,255,255,0)');
                    
                    ctx.fillStyle = grad;
                    ctx.fill();
                });
            }
            
            // Pétalas
            petalas.forEach(p => {
                p.y += p.velY;
                p.x += p.velX;
                p.rot += 0.01;
                
                if (p.y > canvas.height + 50) {
                    p.y = -50;
                    p.x = Math.random() * canvas.width;
                }
                
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rot);
                
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.quadraticCurveTo(p.tamanho/2, -p.tamanho/3, p.tamanho, 0);
                ctx.quadraticCurveTo(p.tamanho/2, p.tamanho/3, 0, 0);
                ctx.fillStyle = p.cor;
                ctx.fill();
                ctx.restore();
            });
            
            animationId = requestAnimationFrame(animar);
        }

        // ===========================================
        // CLIQUE NA TELA (TUDO FUNCIONA ASSIM)
        // ===========================================
        document.addEventListener('click', function(e) {
            const instrucao = document.getElementById('instrucao');
            const cartaOverlay = document.getElementById('cartaOverlay');
            const finalContainer = document.getElementById('finalContainer');
            
            // Se clicou no selo, abre carta
            if (e.target.closest('.selo')) {
                if (!document.getElementById('textoCarta').innerHTML) {
                    const texto = config.textoCarta.replace('[Seu nome]', config.seuNome);
                    const textoEl = document.getElementById('textoCarta');
                    textoEl.innerHTML = '';
                    let i = 0;
                    function digitar() {
                        if (i < texto.length) {
                            textoEl.innerHTML += texto[i];
                            i++;
                            setTimeout(digitar, 45);
                        }
                    }
                    digitar();
                }
                return;
            }
            
            // Se clicou no botão secreto
            if (e.target.id === 'btnSecreto') {
                const textoSecreto = document.getElementById('textoSecreto');
                textoSecreto.classList.toggle('visivel');
                if (textoSecreto.classList.contains('visivel')) {
                    textoSecreto.innerHTML = config.textoSecreto.replace('[Seu nome]', config.seuNome);
                    e.target.innerHTML = '🤍 Fechar';
                } else {
                    e.target.innerHTML = '🔒 Só pra ela';
                }
                return;
            }
            
            // Se clicou fora da carta quando ela está visível
            if (cartaOverlay.classList.contains('visivel') && !e.target.closest('.carta-antiga')) {
                cartaOverlay.classList.remove('visivel');
                instrucao.style.opacity = '1';
                instrucao.innerHTML = '🌹 Clique para o final 🌹';
                instrucao.style.display = 'block';
                return;
            }
            
            // Se clicou no final
            if (instrucao.innerHTML === '🌹 Clique para o final 🌹' && !cartaOverlay.classList.contains('visivel')) {
                finalContainer.classList.add('visivel');
                instrucao.style.display = 'none';
                
                const euTeAmo = document.getElementById('euTeAmo');
                const felizDia = document.getElementById('felizDia');
                
                euTeAmo.innerHTML = '';
                felizDia.innerHTML = '';
                
                setTimeout(() => {
                    const texto1 = 'Eu te amo.';
                    let i = 0;
                    const int1 = setInterval(() => {
                        if (i < texto1.length) {
                            euTeAmo.innerHTML += texto1[i];
                            i++;
                        } else {
                            clearInterval(int1);
                            setTimeout(() => {
                                const texto2 = 'Feliz Dia das Mulheres';
                                let j = 0;
                                const int2 = setInterval(() => {
                                    if (j < texto2.length) {
                                        felizDia.innerHTML += texto2[j];
                                        j++;
                                    } else {
                                        clearInterval(int2);
                                    }
                                }, 70);
                            }, 1000);
                        }
                    }, 120);
                }, 500);
                return;
            }
            
            // Clique normal para avançar estágios
            if (!cartaOverlay.classList.contains('visivel') && !finalContainer.classList.contains('visivel')) {
                
                // Inicia música no primeiro clique
                if (!musicaIniciada) {
                    musica.src = config.musica;
                    musica.play().catch(() => {});
                    musicaIniciada = true;
                }
                
                estagio++;
                
                switch(estagio) {
                    case 1:
                        particulas = criarCoracao();
                        instrucao.innerHTML = '💗 Coração de luz 💗';
                        break;
                    case 2:
                        if (particulasOlhar.length > 0) {
                            particulas = particulasOlhar;
                        }
                        instrucao.innerHTML = '✨ O olhar dela ✨';
                        break;
                    case 3:
                        particulas = criarFraseLuz();
                        instrucao.innerHTML = '💘 Eu amo você 💘';
                        break;
                    case 4:
                        particulas = [];
                        criarPetalas();
                        instrucao.innerHTML = '🌹 Chuva de pétalas 🌹';
                        break;
                    case 5:
                        cartaOverlay.classList.add('visivel');
                        instrucao.style.opacity = '0';
                        break;
                }
            }
        });

        // Iniciar
        particulas = criarCoracao();
        animar();
    </script>
</body>
</html>
