<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Minha Renata</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --pink: #ff2b6a; --wine: #4a0e0e; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Cinzel', serif; overflow: hidden; height: 100vh; cursor: pointer; }
        
        canvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }

        .layer {
            position: absolute; width: 100%; height: 100%; z-index: 10;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; transition: all 1.5s ease; opacity: 0; pointer-events: none;
        }
        .active { opacity: 1; pointer-events: auto; }

        /* Foto e Frase */
        #foto-renata {
            width: 250px; height: 350px; object-fit: cover;
            border: 2px solid var(--pink); border-radius: 15px;
            box-shadow: 0 0 50px var(--pink);
        }

        /* Envelope */
        .envelope-container {
            position: relative; transform: translateY(100vh); transition: transform 2s ease;
        }
        .envelope-visible { transform: translateY(0); }
        #img-envelope { width: 350px; border-radius: 5px; box-shadow: 0 10px 30px #000; }
        .btn-open {
            position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%);
            background: var(--wine); color: var(--gold); border: 1px solid var(--gold);
            padding: 8px 20px; cursor: pointer; border-radius: 20px; font-weight: bold;
        }

        /* Folha de Texto */
        .parchment {
            width: 90%; max-width: 450px; aspect-ratio: 3/4;
            background: url('download (2).jpg') no-repeat center/100% 100%;
            padding: 60px 40px; color: #2c1e1a; text-align: left;
            font-family: 'Dancing Script', cursive; font-size: 1.4rem;
        }

        .btn-group { display: flex; gap: 20px; margin-top: 20px; }
        .btn-ui {
            background: var(--wine); color: #fff; border: 1px solid var(--gold);
            padding: 10px 20px; cursor: pointer; border-radius: 5px;
        }

        /* Rosa Final */
        .rosa-container {
            animation: rotateY 4s infinite linear;
            font-size: 80px;
        }
        @keyframes rotateY { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }
    </style>
</head>
<body onclick="nextStep()">

    <audio id="musica" loop><source src="Lana-Del-Rey.mp3" type="audio/mp3"></audio>
    <canvas id="mainCanvas"></canvas>

    <div id="step2" class="layer">
        <img src="renata.jpg" id="foto-renata">
        <h1 style="margin-top:20px; color: var(--pink); letter-spacing: 5px;">EU AMO VOCÊ</h1>
    </div>

    <div id="step3" class="layer">
        <div class="envelope-container" id="env-cont">
            <img src="download (3).jpg" id="img-envelope">
            <button class="btn-open" onclick="openLetter(event)">OPEN</button>
        </div>
    </div>

    <div id="step4" class="layer">
        <div class="parchment">
            <div id="typewriter"></div>
            <div id="final-btns" class="btn-group" style="opacity:0; transition: 1s;">
                <button class="btn-ui" onclick="alert('Senha: Sua Data Preferida')">SÓ PARA VOCÊ</button>
                <button class="btn-ui" onclick="goFinal(event)">CONTINUE ❤️</button>
            </div>
        </div>
    </div>

    <div id="step5" class="layer">
        <div class="rosa-container">🌹</div>
        <h1 style="color: var(--pink); margin-top: 20px;">TE AMO</h1>
        <h2 style="color: var(--gold); margin-top: 10px;">FELIZ DIA DAS MULHERES</h2>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, currentStage = 0;
        let particles = [];
        let heartScale = 0;
        const textToType = "Minha querida Renata...\n\nNesta folha antiga, tento traduzir o que o tempo não apaga. Você é a poesia que meus olhos recitam em silêncio.\n\nObrigado por ser a luz no meu caminho e a paz no meu caos.";

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        // --- LÓGICA DO CORAÇÃO DE LUZ ---
        function drawHeart(sc, color, rotation = 0) {
            ctx.save();
            ctx.translate(width/2, height/2);
            ctx.rotate(rotation);
            ctx.beginPath();
            ctx.shadowBlur = 25;
            ctx.shadowColor = color;
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            for (let t = 0; t <= Math.PI * 2; t += 0.05) {
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                ctx.lineTo(x * sc, y * sc);
            }
            ctx.stroke();
            // Efeito de feixes internos
            ctx.globalAlpha = 0.2;
            ctx.moveTo(0,0);
            ctx.lineTo(Math.cos(Date.now()*0.002)*100, Math.sin(Date.now()*0.002)*100);
            ctx.stroke();
            ctx.restore();
        }

        // --- CHUVA DE PÉTALAS ---
        function updatePetals() {
            if(currentStage >= 3 && Math.random() > 0.9) {
                particles.push({x: Math.random()*width, y:-20, s: Math.random()*6+2, sp: Math.random()*2+1});
            }
            particles.forEach((p, i) => {
                p.y += p.sp;
                ctx.fillStyle = "#ffb7c5";
                ctx.beginPath();
                ctx.ellipse(p.x, p.y, p.s, p.s/1.5, Math.PI/4, 0, Math.PI*2);
                ctx.fill();
                if(p.y > height) particles.splice(i, 1);
            });
        }

        function animate() {
            ctx.fillStyle = "rgba(0,0,0,0.1)"; // Motion blur
            ctx.fillRect(0,0,width,height);

            const time = Date.now() * 0.002;
            
            if(currentStage === 0) {
                drawHeart(10 + Math.sin(time)*2, "#fff", time*0.2);
            } else if(currentStage === 1) {
                drawHeart(12, varColor(), time*0.5);
            } else if(currentStage === 2) {
                drawHeart(22, "#ff2b6a", 0); // Moldura foto
            } else if(currentStage >= 5) {
                drawHeart(15, "#f00", time); // Final
            }

            updatePetals();
            requestAnimationFrame(animate);
        }

        function varColor() { return `hsl(${Math.sin(Date.now()*0.001)*360}, 70%, 60%)`; }

        // --- CONTROLE DE FLUXO ---
        function nextStep() {
            if(currentStage === 0) {
                document.getElementById('musica').play();
                currentStage = 1;
            } else if(currentStage === 1) {
                document.getElementById('step2').classList.add('active');
                currentStage = 2;
            } else if(currentStage === 2) {
                document.getElementById('step2').classList.remove('active');
                document.getElementById('step3').classList.add('active');
                setTimeout(() => document.getElementById('env-cont').classList.add('envelope-visible'), 100);
                currentStage = 3;
            }
        }

        function openLetter(e) {
            e.stopPropagation();
            document.getElementById('step3').classList.remove('active');
            document.getElementById('step4').classList.add('active');
            currentStage = 4;
            startTypewriter();
        }

        function startTypewriter() {
            const box = document.getElementById('typewriter');
            let i = 0;
            const timer = setInterval(() => {
                box.innerHTML += textToType.charAt(i);
                i++;
                if(i >= textToType.length) {
                    clearInterval(timer);
                    document.getElementById('final-btns').style.opacity = 1;
                }
            }, 50);
        }

        function goFinal(e) {
            e.stopPropagation();
            document.getElementById('step4').classList.remove('active');
            document.getElementById('step5').classList.add('active');
            currentStage = 5;
        }

        window.addEventListener('resize', init);
        init();
        animate();
    </script>
</body>
</html>
